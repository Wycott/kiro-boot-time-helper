name: .NET Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore UptimeTracker.sln

      - name: Build solution
        run: dotnet build UptimeTracker.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test UptimeTracker.sln --no-build --configuration Release --verbosity normal
